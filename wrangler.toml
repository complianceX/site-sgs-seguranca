#:schema node_modules/wrangler/config-schema.json
name = "site-sgs-seguranca"
compatibility_date = "2024-04-01"
pages_build_output_dir = ".next"

[vars]
NEXT_PUBLIC_SITE_URL = "https://sgsseguranca.com.br"
# Segredos devem ser configurados no painel da Cloudflare ou via 'wrangler secret'

[placement]
mode = "smart"

# Configurações de Build para Next.js na Cloudflare Pages
[build]
command = "npm run build"
path = ".next"
